# speech-upscale module worker (vivijure-module/2): dialogue SPEECH enhancement (resemble-enhance) on
# the dedicated vivijure-audio-upscale RunPod endpoint (CUDA). Bound into the core as
# MODULE_SPEECH_UPSCALE; the registry discovers it from GET /module.json.
#
# account_id is read from CLOUDFLARE_ACCOUNT_ID (env), not hardcoded, same as the core. This worker
# holds no R2 creds -- the endpoint reads/writes the shared bucket by key itself.

name = "vivijure-module-speech-upscale"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

[observability]
enabled = true

# RUNPOD_API_KEY + RUNPOD_ENDPOINT_ID are bound from the account-level Cloudflare Secrets Store --
# declarative config that every `wrangler deploy` re-establishes, so a fresh-create can't start
# secretless and silently degrade into "no-runpod-secrets" passthrough (#238, the same class as the
# v0.2.2 finish-upscale bug #237 fixed). Seeded ONCE by the operator; values never touch CI/GitHub.
# RUNPOD_ENDPOINT_ID resolves to the dedicated vivijure-audio-upscale endpoint (store secret
# AUDIO_UPSCALE_RUNPOD_ENDPOINT_ID); RUNPOD_API_KEY is the shared store secret. store_id is filled at
# deploy (ci.yml / deploy.sh). See docs/DEPLOYMENT.md "Module secrets via the Secrets Store".
[[secrets_store_secrets]]
binding = "RUNPOD_API_KEY"
store_id = "REPLACE_WITH_VIVIJURE_SECRETS_STORE_ID"
secret_name = "RUNPOD_API_KEY"

[[secrets_store_secrets]]
binding = "RUNPOD_ENDPOINT_ID"
store_id = "REPLACE_WITH_VIVIJURE_SECRETS_STORE_ID"
secret_name = "AUDIO_UPSCALE_RUNPOD_ENDPOINT_ID"
