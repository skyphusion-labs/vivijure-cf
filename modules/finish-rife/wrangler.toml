# finish-rife module worker (vivijure-module/2): RIFE frame interpolation + GFPGAN face restore,
# running on the shared vivijure-backend RunPod endpoint as action="finish_clip".
# Bound into the core as MODULE_FINISH_RIFE; the registry discovers it from GET /module.json.
#
# account_id is read from CLOUDFLARE_ACCOUNT_ID (env), not hardcoded, same as the core.

name = "vivijure-module-finish-rife"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

[observability]
enabled = true

# Clips are read and written in the shared render bucket.
[[r2_buckets]]
binding = "R2_RENDERS"
bucket_name = "vivijure"

# RUNPOD_API_KEY + RUNPOD_ENDPOINT_ID are bound from the account-level Cloudflare Secrets Store --
# declarative config that every `wrangler deploy` re-establishes, so a fresh-create can't start
# secretless and silently degrade (the v0.2.2 finish-upscale passthrough bug). Seeded ONCE by the
# operator from the crew secret store; values never touch CI/GitHub. Set store_id at cutover.
# See docs/DEPLOYMENT.md "Module secrets via the Secrets Store".
[[secrets_store_secrets]]
binding = "RUNPOD_API_KEY"
store_id = "REPLACE_WITH_VIVIJURE_SECRETS_STORE_ID"
secret_name = "RUNPOD_API_KEY"

[[secrets_store_secrets]]
binding = "RUNPOD_ENDPOINT_ID"
store_id = "REPLACE_WITH_VIVIJURE_SECRETS_STORE_ID"
secret_name = "BACKEND_RUNPOD_ENDPOINT_ID"
