# cloud-keyframe module worker (vivijure-module/2): a GPUless `keyframe` producer. It turns a
# project's storyboard into one start keyframe per shot via reference-conditioned CLOUD image
# generation (FLUX-2 multiref / nano-banana-pro), conditioning on the cast portraits packed in the
# bundle -- no GPU backend, no RunPod, no LoRA. Bound into the core as MODULE_CLOUD_KEYFRAME; the
# registry discovers it from GET /module.json and the studio renders the keyframe stage from it.
#
# It serves the same `keyframe` hook as the GPU `keyframe` module (pick_one): install whichever one
# fits the render -- GPU (SDXL + cast LoRAs) or cloud (reference-conditioned, zero GPU rental).
#
# account_id is read from CLOUDFLARE_ACCOUNT_ID (env), not hardcoded, same as the core.

name = "vivijure-module-cloud-keyframe"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

[observability]
enabled = true

# Image generation: FLUX-2 runs direct on the binding (multipart multiref); proxied models (e.g.
# nano-banana-pro) use the AI Gateway. Set GATEWAY_ID before selecting the proxied model:
#   GATEWAY_ID is now bound from the account-level Cloudflare Secrets Store
#   (see the [[secrets_store_secrets]] block at the end of this file); no `wrangler secret put` needed.
[ai]
binding = "AI"

# Cloudflare Images: downscale reference portraits to <=512px (FLUX-2's input cap; bounds the
# nano-banana data URIs) AND normalize each keyframe to the configured WxH so its aspect (which drives
# the downstream i2v clip aspect) is pinned. Treated as optional in code, but it should stay bound in
# prod -- FLUX-2 rejects an oversized reference, and nano-banana picks its own aspect without it.
[images]
binding = "IMAGES"

# The shared render bucket: the module reads the project bundle, stages downscaled refs + the async
# run-state doc here, and writes each keyframe to renders/<project>/keyframes/<shot>.png.
[[r2_buckets]]
binding = "R2_RENDERS"
bucket_name = "vivijure"

# GATEWAY_ID (the AI Gateway slug) is bound from the account-level Cloudflare Secrets Store --
# declarative config that every `wrangler deploy` re-establishes; seeded ONCE by the operator from the
# crew secret store, never in CI/GitHub. Set store_id at cutover.
# See docs/DEPLOYMENT.md "Module secrets via the Secrets Store".
[[secrets_store_secrets]]
binding = "GATEWAY_ID"
store_id = "REPLACE_WITH_VIVIJURE_SECRETS_STORE_ID"
secret_name = "GATEWAY_ID"
