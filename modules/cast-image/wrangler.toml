# cast-image module worker (vivijure-module/2): generates a character's LoRA TRAINING reference set
# from a portrait + bible via the studio image models (FLUX 2 Klein / Nano Banana Pro), with the
# safety-flag fallback. A server-side lift of public/cast.js's generateTrainingSet -- swappable, and
# no longer blocking the cast page. Bound into the core as MODULE_CAST_IMAGE; the registry discovers
# it from GET /module.json and the studio renders the cast.image stage from it.
# account_id is read from CLOUDFLARE_ACCOUNT_ID (env), not hardcoded, same as the core.

name = "vivijure-module-cast-image"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

[observability]
enabled = true

# Image generation: FLUX 2 runs direct on the binding (multipart multiref); proxied models use the
# AI Gateway. Set GATEWAY_ID before exercising the nano-banana fallback:
#   GATEWAY_ID is now bound from the account-level Cloudflare Secrets Store
#   (see the [[secrets_store_secrets]] block at the end of this file); no `wrangler secret put` needed.
[ai]
binding = "AI"

# Cloudflare Images: downscale reference images to <=512px before generation. FLUX-2 rejects inputs
# larger than 512x512 per image; this also bounds the base64 nano-banana image_input payloads. The
# code treats it as optional (refs pass through un-resized if absent), but it should stay bound in prod.
[images]
binding = "IMAGES"

# Generated reference images + the async run-state docs land in the shared render bucket so the core
# can register them onto the cast member's ref set.
[[r2_buckets]]
binding = "R2_RENDERS"
bucket_name = "vivijure"

# GATEWAY_ID (the AI Gateway slug) is bound from the account-level Cloudflare Secrets Store --
# declarative config that every `wrangler deploy` re-establishes; seeded ONCE by the operator from the
# crew secret store, never in CI/GitHub. Set store_id at cutover.
# See docs/DEPLOYMENT.md "Module secrets via the Secrets Store".
[[secrets_store_secrets]]
binding = "GATEWAY_ID"
store_id = "REPLACE_WITH_VIVIJURE_SECRETS_STORE_ID"
secret_name = "GATEWAY_ID"
