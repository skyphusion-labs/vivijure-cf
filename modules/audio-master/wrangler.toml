# audio-master module worker (vivijure-module/2): film-level audio mastering -- music upscale (soxr 48k
# + air lift) + LUFS loudness normalization -- via the always-on audio-master CPU container on the fleet
# over Workers VPC (CPU ffmpeg, no GPU; GPU money is for GPU work only). Bound into the core as
# MODULE_AUDIO_MASTER; the registry discovers it from GET /module.json.
#
# account_id is read from CLOUDFLARE_ACCOUNT_ID (env), not hardcoded, same as the core. CREDENTIALLESS:
# the core presigns the bed GET + the mastered PUT; this worker holds no R2 creds and never sees the
# container's network -- it reaches it through the AUDIO_MASTER_VPC binding.

name = "vivijure-module-audio-master"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

[observability]
enabled = true

# Workers VPC -> always-on audio-master CPU container on the fleet (containers/audio-master). The module
# calls the /master route synchronously. Mirrors the subtitle (VIDEO_FINISH_VPC) + beat-sync
# (AUDIO_BEAT_SYNC_VPC) VPC blocks.
#
# AUDIO_MASTER_VPC -> the always-on audio-master CPU container on the operator's container host. Workers VPC Service created
# 2026-06-23, resolving over the host-local tunnel. An unbound binding soft-degrades the
# master phase to the un-mastered bed (#249 / #77); it never drops the film.
[[vpc_services]]
binding = "AUDIO_MASTER_VPC"
service_id = "REPLACE_WITH_VPC_AUDIO_MASTER_ID"
remote = true
