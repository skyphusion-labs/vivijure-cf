# music-gen module worker (vivijure-module/2): MiniMax Music 2.6 via Workers AI for the `score`
# hook (music / narration / beat-sync chain). Bound as MODULE_MUSIC_GEN.
# account_id is read from CLOUDFLARE_ACCOUNT_ID (env), not hardcoded, same as the core.

name = "vivijure-module-music-gen"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

[observability]
enabled = true

# Workers AI + AI Gateway (same pattern as cast-image proxied models).
#   GATEWAY_ID is now bound from the account-level Cloudflare Secrets Store
#   (see the [[secrets_store_secrets]] block at the end of this file); no `wrangler secret put` needed.
[ai]
binding = "AI"

# Generated audio + async run state land in the shared render bucket (out/<job>.mp3).
[[r2_buckets]]
binding = "R2_RENDERS"
bucket_name = "vivijure"

# The blocking MiniMax gen runs in a Workflow step (unlimited wall, retried, survives recycle) instead of
# a request-path ctx.waitUntil that the runtime cancels at ~30s (#155).
[[workflows]]
name = "music-gen-score"
binding = "SCORE_WORKFLOW"
class_name = "MusicGenWorkflow"

# GATEWAY_ID (the AI Gateway slug) is bound from the account-level Cloudflare Secrets Store --
# declarative config that every `wrangler deploy` re-establishes; seeded ONCE by the operator from the
# crew secret store, never in CI/GitHub. Set store_id at cutover.
# See docs/DEPLOYMENT.md "Module secrets via the Secrets Store".
[[secrets_store_secrets]]
binding = "GATEWAY_ID"
store_id = "REPLACE_WITH_VIVIJURE_SECRETS_STORE_ID"
secret_name = "GATEWAY_ID"
