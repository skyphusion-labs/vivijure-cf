# keyframe module worker (vivijure-module/2): drives the vivijure-backend GPU render endpoint on
# RunPod in keyframes-only mode (action=preview) to turn a project's storyboard into start
# keyframes. Bound into the core as MODULE_KEYFRAME; the registry discovers it from GET /module.json
# and the studio renders the keyframe stage from it.
#
# No R2 binding: the backend writes the keyframe PNGs to the shared `vivijure` bucket with its own
# creds; this module only reports the keys (the core presigns them for the motion.backend stage).
#
# account_id is read from CLOUDFLARE_ACCOUNT_ID (env), not hardcoded, same as the core.

name = "vivijure-module-keyframe"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

[observability]
enabled = true

# RUNPOD_API_KEY + RUNPOD_ENDPOINT_ID (the vivijure-backend endpoint id) are bound from the account-level
# Cloudflare Secrets Store -- declarative config that every `wrangler deploy` re-establishes, so a
# fresh-create can't start secretless and silently degrade (the v0.2.2 finish-upscale passthrough bug).
# Seeded ONCE by the operator from the crew secret store; values never touch CI/GitHub. Set store_id at
# cutover. See docs/DEPLOYMENT.md "Module secrets via the Secrets Store".
[[secrets_store_secrets]]
binding = "RUNPOD_API_KEY"
store_id = "REPLACE_WITH_VIVIJURE_SECRETS_STORE_ID"
secret_name = "RUNPOD_API_KEY"

[[secrets_store_secrets]]
binding = "RUNPOD_ENDPOINT_ID"
store_id = "REPLACE_WITH_VIVIJURE_SECRETS_STORE_ID"
secret_name = "BACKEND_RUNPOD_ENDPOINT_ID"
