# finish-upscale module worker (vivijure-module/2): Real-ESRGAN 2x/4x spatial upscale on the dedicated
# vivijure-upscale RunPod endpoint (CUDA, separate from vivijure-backend). Bound into the core as
# MODULE_UPSCALE; the registry discovers it from GET /module.json.
#
# account_id is read from CLOUDFLARE_ACCOUNT_ID (env), not hardcoded, same as the core. This worker
# holds no R2 creds -- the endpoint reads/writes the shared bucket by key itself.

name = "vivijure-module-finish-upscale"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

[observability]
enabled = true

# RUNPOD_API_KEY + RUNPOD_ENDPOINT_ID are bound from the account-level Cloudflare Secrets Store --
# declarative config that every `wrangler deploy` re-establishes, so a fresh-create can't start
# secretless and silently degrade (the v0.2.2 finish-upscale passthrough bug this fixes). Seeded ONCE
# by the operator from the crew secret store; values never touch CI/GitHub. Set store_id at cutover.
# See docs/DEPLOYMENT.md "Module secrets via the Secrets Store".
[[secrets_store_secrets]]
binding = "RUNPOD_API_KEY"
store_id = "REPLACE_WITH_VIVIJURE_SECRETS_STORE_ID"
secret_name = "RUNPOD_API_KEY"

[[secrets_store_secrets]]
binding = "RUNPOD_ENDPOINT_ID"
store_id = "REPLACE_WITH_VIVIJURE_SECRETS_STORE_ID"
secret_name = "VIDEO_UPSCALE_RUNPOD_ENDPOINT_ID"

[vars]
RUNPOD_WORKERS_MAX = "2"
