# narration-gen module worker (vivijure-module/2): MiniMax Speech 02 HD on RunPod for the `score` hook.
# Uses the same async submit+poll RunPod transport as seedance/kling (NOT Workers AI), so a multi-minute
# synth never blocks a request and survives a worker recycle (#155).
# account_id is read from CLOUDFLARE_ACCOUNT_ID (env), not hardcoded, same as the core.

name = "vivijure-module-narration-gen"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

[observability]
enabled = true

# RunPod hosted minimax-speech-02-hd endpoint (https://api.runpod.ai/v2/minimax-speech-02-hd).
#   RUNPOD_API_KEY is now bound from the account-level Cloudflare Secrets Store
#   (see the [[secrets_store_secrets]] block at the end of this file); no `wrangler secret put` needed.

# Generated narration audio lands in the shared render bucket.
[[r2_buckets]]
binding = "R2_RENDERS"
bucket_name = "vivijure"

# RUNPOD_API_KEY is bound from the account-level Cloudflare Secrets Store -- declarative config that
# every `wrangler deploy` re-establishes, so a fresh-create can't start secretless and silently
# degrade (the v0.2.2 finish-upscale passthrough bug). Seeded ONCE by the operator from the crew
# secret store; values never touch CI/GitHub. Set store_id to the real id at cutover.
# See docs/DEPLOYMENT.md "Module secrets via the Secrets Store".
[[secrets_store_secrets]]
binding = "RUNPOD_API_KEY"
store_id = "REPLACE_WITH_VIVIJURE_SECRETS_STORE_ID"
secret_name = "RUNPOD_API_KEY"
