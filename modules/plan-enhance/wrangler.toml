# plan-enhance module worker (vivijure-module/2).
#
# The first opt-in Vivijure module: an Opus director pass over a storyboard's shot prompts. Bound
# into the core as the MODULE_PLANENHANCE service binding (see the core wrangler.toml); the registry
# discovers it from GET /module.json and the studio UI renders the plan.enhance stage from it.
#
# account_id is read from CLOUDFLARE_ACCOUNT_ID (env), not hardcoded, same as the core.

name = "vivijure-module-plan-enhance"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

[observability]
enabled = true

# Workers AI binding. Used two ways:
#   1. .gateway(GATEWAY_ID).getUrl("anthropic") -> Opus through the AI Gateway (the primary director).
#   2. .run(<local model>) -> the free Workers AI fallback when no Opus token is set, or Opus errors.
[ai]
binding = "AI"

# The Opus model id (latest by default). Override to pin a different Claude (e.g. claude-opus-4-7).
[vars]
ENHANCE_MODEL = "claude-opus-4-8"

# GATEWAY_ID + CF_AIG_TOKEN are bound from the account-level Cloudflare Secrets Store (see the
# [[secrets_store_secrets]] blocks below); no `wrangler secret put` needed. Without both, the module
# runs entirely on the free local Workers AI model (no Opus, still functional).
#
# GATEWAY_ID is the shared AI Gateway slug (same store secret the other modules bind). CF_AIG_TOKEN
# is a Unified-Billing token scoped to THIS module (per-function key), so it binds from a
# module-scoped store secret PLAN_ENHANCE_CF_AIG_TOKEN -- distinct from the core's own CF_AIG_TOKEN,
# so a rotation of one never touches the other (the same per-resource pattern #237 used for
# RUNPOD_ENDPOINT_ID). The binding name in code stays CF_AIG_TOKEN; only the store secret_name differs.
# Seeded ONCE by the operator from the crew secret store; values never touch CI/GitHub. Set store_id
# at cutover. See docs/DEPLOYMENT.md "Module secrets via the Secrets Store".
# NEW store secret to seed: PLAN_ENHANCE_CF_AIG_TOKEN (GATEWAY_ID is already seeded).
[[secrets_store_secrets]]
binding = "GATEWAY_ID"
store_id = "REPLACE_WITH_VIVIJURE_SECRETS_STORE_ID"
secret_name = "GATEWAY_ID"

[[secrets_store_secrets]]
binding = "CF_AIG_TOKEN"
store_id = "REPLACE_WITH_VIVIJURE_SECRETS_STORE_ID"
secret_name = "PLAN_ENHANCE_CF_AIG_TOKEN"
