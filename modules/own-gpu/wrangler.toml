# own-gpu module worker (vivijure-module/2): image-to-video on YOUR OWN GPU via the vivijure-backend
# RunPod serverless endpoint (Wan2.2-I2V, the i2v_clip action). Bound into the core as MODULE_OWN_GPU;
# the registry discovers it from GET /module.json and the studio renders the motion.backend stage.
# This is the BYO-GPU default (ui.order 5, ahead of the cloud i2v modules) -- no rent, own keys.
#
# The backend SHARES our R2 bucket: it reads the keyframe by key and writes the finished clip itself,
# returning the clip_key. So this module needs NO R2 binding, only the RunPod creds.
# account_id is read from CLOUDFLARE_ACCOUNT_ID (env), not hardcoded, same as the core.

name = "vivijure-module-own-gpu"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

[observability]
enabled = true

# RUNPOD_API_KEY + RUNPOD_ENDPOINT_ID (the user's own i2v endpoint) are bound from the account-level
# Cloudflare Secrets Store -- declarative config that every `wrangler deploy` re-establishes, so a
# fresh-create can't start secretless and silently degrade (the v0.2.2 finish-upscale passthrough bug).
# Seeded ONCE by the operator from the crew secret store; values never touch CI/GitHub. Set store_id at
# cutover. See docs/DEPLOYMENT.md "Module secrets via the Secrets Store".
[[secrets_store_secrets]]
binding = "RUNPOD_API_KEY"
store_id = "REPLACE_WITH_VIVIJURE_SECRETS_STORE_ID"
secret_name = "RUNPOD_API_KEY"

[[secrets_store_secrets]]
binding = "RUNPOD_ENDPOINT_ID"
store_id = "REPLACE_WITH_VIVIJURE_SECRETS_STORE_ID"
secret_name = "BACKEND_RUNPOD_ENDPOINT_ID"

[vars]
# cf#61: expected workersMax for pre-submit idle reconcile (prod backend: 4).
RUNPOD_WORKERS_MAX = "4"
