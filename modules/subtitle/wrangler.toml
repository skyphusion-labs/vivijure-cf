# subtitle module worker (vivijure-module/2): time-synced dialogue captions burned onto the assembled
# film (and/or a soft .srt sidecar), via the video-finish CPU container's /subtitle route (Workers
# VPC). A film.finish hook. Bound into the core as MODULE_SUBTITLE; the registry discovers it from
# GET /module.json.
#
# CREDENTIALLESS: the core presigns the film GET + the result PUT (+ an optional .srt sidecar PUT) and
# hands them in the invoke input, along with the timed caption cues. This module needs no R2 binding
# and no S3 secret -- it only formats the SRT and forwards the spec to the container.
#
# account_id is read from CLOUDFLARE_ACCOUNT_ID (env), not hardcoded, same as the core.

name = "vivijure-module-subtitle"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

[observability]
enabled = true

# Workers VPC -> always-on video-finish container on the fleet. Same endpoint the core uses for
# /finish and film-titles uses for /film-titles; this module calls the /subtitle route (caption burn).
[[vpc_services]]
binding = "VIDEO_FINISH_VPC"
service_id = "REPLACE_WITH_VPC_VIDEO_FINISH_ID"
remote = true
