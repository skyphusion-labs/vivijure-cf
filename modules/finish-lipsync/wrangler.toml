# finish-lipsync module worker (vivijure-module/2): MuseTalk audio-driven lip-sync on the dedicated
# vivijure-musetalk RunPod endpoint (cu128, separate from vivijure-backend). Bound into the core as
# MODULE_LIPSYNC; the registry discovers it from GET /module.json. Runs in the `finish` chain before
# the upscaler (ui.order 15 < 20) so a lip-synced shot is then upscaled.
#
# account_id is read from CLOUDFLARE_ACCOUNT_ID (env), not hardcoded, same as the core. This worker
# holds no R2 creds -- the endpoint reads/writes the shared bucket by key itself.

name = "vivijure-module-finish-lipsync"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

[observability]
enabled = true

# RUNPOD_API_KEY + RUNPOD_ENDPOINT_ID (the vivijure-musetalk endpoint) are bound from the account-level
# Cloudflare Secrets Store -- declarative config that every `wrangler deploy` re-establishes, so a
# fresh-create can't start secretless and silently degrade (the v0.2.2 finish-upscale passthrough bug).
# Seeded ONCE by the operator from the crew secret store; values never touch CI/GitHub. Set store_id at
# cutover. See docs/DEPLOYMENT.md "Module secrets via the Secrets Store".
[[secrets_store_secrets]]
binding = "RUNPOD_API_KEY"
store_id = "REPLACE_WITH_VIVIJURE_SECRETS_STORE_ID"
secret_name = "RUNPOD_API_KEY"

[[secrets_store_secrets]]
binding = "RUNPOD_ENDPOINT_ID"
store_id = "REPLACE_WITH_VIVIJURE_SECRETS_STORE_ID"
secret_name = "MUSETALK_RUNPOD_ENDPOINT_ID"
