# beat-sync module worker (vivijure-module/2): librosa beat analysis via the always-on
# audio-beat-sync container on the Hetzner fleet (Workers VPC). Bound as MODULE_BEAT_SYNC.
# account_id is read from CLOUDFLARE_ACCOUNT_ID (env), not hardcoded, same as the core.

name = "vivijure-module-beat-sync"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

[observability]
enabled = true

# Workers VPC -> fleet audio-beat-sync (issue #83; off CF Containers, no cold start).
[[vpc_services]]
binding = "AUDIO_BEAT_SYNC_VPC"
service_id = "REPLACE_WITH_VPC_AUDIO_BEAT_SYNC_ID"
remote = true
