name: build-media-images

# The five always-on CPU finishing containers (containers/*) -> GHCR as
# ghcr.io/skyphusion-labs/vivijure-cf-<svc>, for the fleet swarm `vivijure-media` stack
# (fleet-chezmoi system/swarm/stacks/vivijure-media.stack.yml).
#
# Package naming reflects the repo (vivijure-cf-*) so these are unambiguous vs the
# vivijure-local-* variants built by the vivijure-local repo. Pushing with the built-in
# GITHUB_TOKEN (packages: write) links each package to THIS repo automatically -- no PAT,
# no secret in any tracked file; the explicit org.opencontainers.image.source label below
# is belt-and-suspenders for the link.
#
# vivijure-cf is PUBLIC, so per fleet CI policy this runs on GitHub-hosted ubuntu-latest
# (fork-safe), NOT the self-hosted org pool. These are CPU images well under the hosted
# disk budget, so no disk-reclaim step is needed.
#
# Prod pins by digest or version, never :latest (see the swarm stack). Cut a version with
# the workflow_dispatch `tag` input; a containers/** push to main publishes :latest + the
# immutable short SHA so a digest is always available to pin.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional version tag applied to all five images (e.g. 0.4.2). Omit to publish latest + SHA only."
        required: false
        default: ""
  push:
    branches: [main]
    paths:
      - "containers/**"
      - ".github/workflows/build-media-images.yml"

permissions:
  contents: read
  packages: write

concurrency:
  group: build-media-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        svc: [video-finish, image-prep, audio-beat-sync, audio-mix, audio-master]
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tags: always the immutable short SHA + latest; plus the explicit version input when
      # a release is cut. Prod pins to the SHA/digest or the version, never latest.
      - name: Compute tags
        id: tags
        run: |
          set -eu
          IMG="ghcr.io/skyphusion-labs/vivijure-cf-${{ matrix.svc }}"
          SHA="$(git rev-parse --short HEAD)"
          VER="${{ github.event.inputs.tag }}"
          {
            echo "tags<<EOF"
            echo "${IMG}:${SHA}"
            echo "${IMG}:latest"
            if [ -n "$VER" ]; then echo "${IMG}:${VER}"; fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build + push
        uses: docker/build-push-action@v7
        with:
          context: containers/${{ matrix.svc }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/skyphusion-labs/vivijure-cf
          provenance: false
