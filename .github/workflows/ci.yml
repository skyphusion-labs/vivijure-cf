name: CI

# Typecheck + test on every push and PR. DEPLOY ONLY on a version tag (v*), NEVER on a bare push
# to main -- an ordinary merge (even a docs-only one) must not redeploy production. A mid-render
# merge once auto-deployed the core worker and reset the orchestration Durable Object, freezing a
# live render. Releases are now deliberate: cut a SemVer tag to ship.
#   git tag v0.158.0 && git push origin v0.158.0
# vivijure is PUBLIC and accepts outside PRs, so CI runs on GitHub-hosted ubuntu-latest (fork-safe
# sandbox), not the self-hosted fleet pool.
on:
  push:
    branches: [main]
    tags: ["v*"]
  # NO branches filter, deliberately. With `branches: [main]` a STACKED pr (base = another
  # branch, e.g. #64 onto #67) matches nothing and runs ZERO checks -- and GitHub reports
  # "no checks reported", which reads as fine rather than as unverified. Every PR runs
  # typecheck + tests, whatever its base.
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      # The vanilla-JS frontend is deliberately build-free, so tsc never sees it and a call to a
      # function that no longer exists is valid syntax `node --check` happily accepts. Three such
      # defects shipped into the hosted assets in one night (a helper deleted, its call sites left
      # behind); each was caught only by driving the page in a browser. This is that check, run as a
      # step of the required `ci` job so it inherits branch protection. Overrides are per-identifier
      # and need a reason; there is no way to silence a whole file. See scripts/resolve-guard.mjs.
      - name: Resolve guard (frontend calls resolve)
        run: npm run guard:resolve

      - name: Test
        run: npm test

      # deploy/ has a pytest suite (installer/teardown control plane). Without this step,
      # Python regressions in vivijure_deploy.py pass CI silently (#26).
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Deploy unit tests
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pytest deploy/ -q

  # SECURITY GATE (fc#859): a v* tag can point at ANY commit, including one that never merged.
  # The org tag ruleset enforces deletion + non_fast_forward only, so `git tag v9.9.9 <unmerged>
  # && git push origin v9.9.9` would deploy unreviewed code to prod, routing around branch
  # protection. This refuses that. It runs on ubuntu-latest -- NOT the deploy job's
  # node:22-alpine container, which ships without git -- so actions/checkout produces a real
  # repository and merge-base can walk main. Same tag-only condition as `deploy`: this repo
  # publishes ONLY on a v* tag (deploy is itself gated on refs/tags/v*), so there is no
  # branch-dispatch publish path to guard.
  assert-on-main:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Assert built commit is on main (no deploy of an unreviewed commit)
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          head="$(git rev-parse HEAD)"
          if ! git merge-base --is-ancestor "$head" origin/main; then
            echo "::error::commit ${head} is not on origin/main; refusing to deploy an unreviewed commit"
            exit 1
          fi
          echo "commit ${head} is on origin/main; ancestry guard passed."

  deploy:
    # DEPLOY GATE: this job runs ONLY for a pushed version tag (refs/tags/v*), after ci passes.
    # A push/merge to main runs `ci` above but never reaches here, so no merge can redeploy prod
    # (and no merge can bite an in-flight render). To release: push a SemVer tag vX.Y.Z.
    needs: [ci, assert-on-main]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    container: node:22-alpine
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      # The 3 CPU containers (video-finish / image-prep / audio-beat-sync) are NOT built or deployed
      # here. CF Containers were dropped in wrangler.toml migration v2-drop-cpu-containers (issue #83);
      # they run always-on on the operator's container host as Docker services, deployed out of band via
      # containers/compose.yaml. `wrangler deploy` ships ONLY the workers, so no Docker/buildx needed.

      # Module workers deploy BEFORE the core. The core binds each module as a [[services]] dependency,
      # and a binding to a not-yet-deployed service makes the core `wrangler deploy` fail. Deploying
      # modules first keeps every MODULE_* binding pointing at a live service.
      #
      # DEPLOY-BY-DEFAULT: iterate EVERY modules/*/wrangler.toml, never a hardcoded include-list. A
      # hardcoded list silently drifts -- a new module (or a new scope:install config field on an
      # existing one, e.g. notify-email #300) is added to modules/ but forgotten here, so the live
      # worker stays stale and the registry/UI never sees the change. Worse, the core can bind a
      # [[services]] target the list omits, turning the next core deploy into a dangling-binding
      # failure. Deploying every module dir closes both gaps. If a module ever must be skipped, add
      # its dir name to EXCLUDE below (explicit, reviewable) -- do NOT reintroduce an include-list.
      # POSIX sh ONLY: this job runs in `container: node:22-alpine`, whose /bin/sh is BusyBox ash, and
      # GitHub's default `run:` shell there is `sh` (not bash). No bash-isms -- no `shopt`, no `arr=()`
      # arrays, no `${#arr[@]}` -- or the step dies with exit 127 (v0.6.1 failed exactly this way:
      # `shopt: not found`). A plain glob `for` loop is portable; an unmatched glob stays literal, so
      # we test `[ -f "$toml" ]` to handle the empty case.
      # No secret step here BY DESIGN: module secrets (RUNPOD_API_KEY / RUNPOD_ENDPOINT_ID / GATEWAY_ID)
      # are bound declaratively from the account-level Cloudflare Secrets Store via [[secrets_store_secrets]]
      # in each module's wrangler.toml, so `wrangler deploy` re-establishes them every run. A fresh-create
      # can no longer start secretless and silently degrade (the v0.2.2 finish-upscale passthrough), and no
      # secret value ever passes through CI/GitHub. Seeding is a one-time out-of-band op (see docs/DEPLOYMENT.md).
      - name: Deploy module workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # SECRETS_STORE_ID is a repo VARIABLE (an identifier, not a secret -- it was public in the
          # repo before #398 templated it out): the account Secrets Store id the module bindings bind.
          SECRETS_STORE_ID: ${{ vars.SECRETS_STORE_ID }}
          # #520: the 5 media modules carry a REPLACE_WITH_VPC_*_ID placeholder (no hardcoded prod VPC
          # service id in the tracked tomls). Filled per-module below from these repo secrets.
          VPC_VIDEO_FINISH_ID: ${{ secrets.VPC_VIDEO_FINISH_ID }}
          VPC_AUDIO_BEAT_SYNC_ID: ${{ secrets.VPC_AUDIO_BEAT_SYNC_ID }}
          VPC_AUDIO_MASTER_ID: ${{ secrets.VPC_AUDIO_MASTER_ID }}
          # CORE-ONLY host switch. vivijure-cf is the stripped host on the PUBLISHED
          # @skyphusion-labs/vivijure-core: it owns the core worker + registry wiring, and the module
          # workers are deployed and managed INDEPENDENTLY (they stay live and are bound by service name
          # from the core [[services]] list). Set CORE_ONLY_DEPLOY=1 (repo variable) so this tag deploy
          # ships the core only and does not touch the live module fleet. Unset (or "0") = full monolith
          # co-deploy behaviour below (deploy every modules/*/wrangler.toml first).
          CORE_ONLY_DEPLOY: ${{ vars.CORE_ONLY_DEPLOY }}
        run: |
          set -eu
          # CORE-ONLY host: skip module deploy entirely (modules are deployed independently and are
          # already live; the core deploy below binds them by service name). Explicit + logged, never a
          # silent skip: if module configs ARE present under CORE_ONLY_DEPLOY they are a drift signal, so
          # warn loudly rather than quietly ignore them.
          if [ "${CORE_ONLY_DEPLOY:-0}" = "1" ]; then
            echo "CORE_ONLY_DEPLOY=1: deploying the core worker only; module workers are managed independently and bound by service name. Skipping module deploy."
            present=0
            for toml in modules/*/wrangler.toml; do [ -f "$toml" ] && present=$((present + 1)); done
            [ "$present" -gt 0 ] && echo "::warning::CORE_ONLY_DEPLOY=1 but ${present} module wrangler.toml present under modules/ -- they will NOT be deployed by this run"
            exit 0
          fi
          # The committed module tomls ship store_id = "REPLACE_WITH_VIVIJURE_SECRETS_STORE_ID" (no
          # real store id in the public repo, #398). Fill it from SECRETS_STORE_ID before each
          # wrangler deploy, mirroring how the core render injects its placeholders. Fail closed: a
          # blank store_id would deploy every module with a dangling secrets_store_secrets binding
          # (silent degrade / deploy fail -- the v0.7.6 class of break), and deploy.sh (the outsider
          # path that also fills this) never runs in CI.
          if [ -z "${SECRETS_STORE_ID:-}" ]; then
            echo "::error::SECRETS_STORE_ID repo variable is unset -- refusing to deploy modules with an unfilled store_id placeholder"
            exit 1
          fi
          # #520: the media modules (film-titles/subtitle -> video-finish, beat-sync ->
          # audio-beat-sync, audio-master -> audio-master) need their VPC service_id filled. Fail
          # closed if any secret is unset -- an empty service_id ships a broken VPC binding.
          # NOTE: VPC_AUDIO_MASTER_ID is a NEW repo secret (its value = the prod audio-master VPC
          # service id, formerly hardcoded in modules/audio-master/wrangler.toml). Add it before the
          # next release tag, or this step fails loud here.
          for v in VPC_VIDEO_FINISH_ID VPC_AUDIO_BEAT_SYNC_ID VPC_AUDIO_MASTER_ID; do
            eval "vv=\${$v:-}"
            if [ -z "$vv" ]; then echo "::error::$v repo secret is unset -- refusing to deploy a module with an unfilled VPC service_id (#520)"; exit 1; fi
          done
          # Explicit, reviewable skip-list (space-separated module DIR names). Empty = deploy all.
          # DO NOT replace this with a hardcoded include-list: that is what drifted (v0.6.0 omitted
          # 9 modules incl. notify-email, which served config_schema:null). Deploy-by-default; the
          # ONLY way to skip a module is to name it here, with a reason, so the exclusion is reviewed.
          #
          # EXCLUDE is currently EMPTY -- every modules/*/wrangler.toml deploys. To skip a not-ready
          # module, name its DIR here (space-separated) with a reason; that is the ONLY skip path.
          # History: openai-sora + alibaba-wan25 were RETIRED (#306 -- deleted, not just excluded);
          # plan-enhance-py was retired earlier (#469).
          # local-gpu is NO LONGER excluded: its backend is a disposable RunPod SECURE pod running
          # vivijure-local-12gb (LTX i2v) exposed via a TryCloudflare QUICK tunnel -- the recipe proven
          # in that repo (RUN-LOG.md:187-195). LOCAL_BACKEND_URL is the ephemeral *.trycloudflare.com URL
          # re-seeded per pod in the Secrets Store, with the backend-auto-generated LOCAL_BACKEND_TOKEN;
          # the door fails loud when no pod is attached, and the core binds MODULE_LOCAL_GPU. (Excluding
          # it before the backend existed aborted the v0.7.6 deploy: code 10182, unsatisfiable binding.)
          # alibaba-wan-lora DELISTED for v1.0 (#771): its custom-LoRA injection path is unverified (no
          # Wan2.2 i2v LoRA artifact to exercise it). Source kept; drop from EXCLUDE once verified. The
          # core binding is commented in wrangler.toml.example to match, so no dangling MODULE_* binding.
          EXCLUDE="alibaba-wan-lora"
          deployed=0
          found=0
          for toml in modules/*/wrangler.toml; do
            # Unmatched glob stays literal in POSIX sh; skip the non-file sentinel.
            [ -f "$toml" ] || continue
            found=$((found + 1))
            module=$(basename "$(dirname "$toml")")
            skip=0
            for ex in $EXCLUDE; do
              [ "$module" = "$ex" ] && skip=1
            done
            if [ "$skip" -eq 1 ]; then
              echo "Skipping vivijure-module-${module} (in EXCLUDE)"
              continue
            fi
            echo "Deploying vivijure-module-${module}..."
            # Fill the store_id placeholder for THIS module (only those actually deployed, post-EXCLUDE),
            # then guard: a surviving placeholder means an unfilled binding, so fail rather than ship it.
            sed -i "s/REPLACE_WITH_VIVIJURE_SECRETS_STORE_ID/${SECRETS_STORE_ID}/g" "$toml"
            # #520: fill the media-module VPC service_id placeholders (a no-op sed on modules without one).
            sed -i "s/REPLACE_WITH_VPC_VIDEO_FINISH_ID/${VPC_VIDEO_FINISH_ID}/g;s/REPLACE_WITH_VPC_AUDIO_BEAT_SYNC_ID/${VPC_AUDIO_BEAT_SYNC_ID}/g;s/REPLACE_WITH_VPC_AUDIO_MASTER_ID/${VPC_AUDIO_MASTER_ID}/g" "$toml"
            if grep -q "REPLACE_WITH_" "$toml"; then
              echo "::error::store_id placeholder survived in $toml"
              exit 1
            fi
            # Retry a transient Cloudflare API flake (e.g. the Workflows trigger registration
            # that failed the v0.13.0 deploy, #492) so a single hiccup does not abort the ordered
            # tag deploy under set -eu. A persistent failure still fails the step after 3 attempts.
            n=0
            until npx wrangler deploy -c "$toml"; do
              n=$((n + 1))
              [ "$n" -ge 3 ] && { echo "::error::module ${module} failed to deploy after 3 attempts"; exit 1; }
              echo "  transient deploy failure for ${module} -- retry ${n}/3"
              sleep 3
            done
            deployed=$((deployed + 1))
          done
          if [ "$found" -eq 0 ]; then
            echo "::error::no modules/*/wrangler.toml found -- refusing to deploy core with zero modules"
            exit 1
          fi
          echo "Deployed ${deployed} module worker(s) of ${found} module dir(s)."


      # Render the core wrangler.toml from the committed wrangler.toml.example, injecting the
      # account-specific values from encrypted Actions secrets. The real wrangler.toml is gitignored
      # (so the account AUD / resource IDs are not in the public repo); it is rendered fresh here.
      # MUST run BEFORE "Apply D1 migrations": wrangler d1 needs the rendered wrangler.toml to
      # resolve the D1 binding + migrations_dir (the gitignored config does not exist until here).
      # node:22-alpine has no envsubst, so add gettext (POSIX sh). The explicit SHELL-FORMAT var list
      # means ONLY these placeholders substitute -- any other ${...} in the file is left untouched.
      - name: Render core wrangler.toml
        env:
          # #423: auth mode for the rendered config. Prod runs token mode (the edge Access app was
          # removed in the v0.12.0 flip). The render now FAILS LOUD if this var is unset (guard below)
          # instead of defaulting -- an unset default would silently mis-posture prod (e.g. back to
          # access mode with no Access app in front). Set vars.AUTH_MODE explicitly to token or access.
          AUTH_MODE: ${{ vars.AUTH_MODE }}
          ACCESS_TEAM_DOMAIN: ${{ secrets.ACCESS_TEAM_DOMAIN }}
          ACCESS_AUD: ${{ secrets.ACCESS_AUD }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          VPC_VIDEO_FINISH_ID: ${{ secrets.VPC_VIDEO_FINISH_ID }}
          VPC_IMAGE_PREP_ID: ${{ secrets.VPC_IMAGE_PREP_ID }}
          VPC_AUDIO_BEAT_SYNC_ID: ${{ secrets.VPC_AUDIO_BEAT_SYNC_ID }}
          VPC_AUDIO_MIX_ID: ${{ secrets.VPC_AUDIO_MIX_ID }}
          SPEND_RATE_LIMITER_NS_ID: ${{ secrets.SPEND_RATE_LIMITER_NS_ID }}
          # Opt-in Workers-for-Platforms switch. A repo VARIABLE (not a secret -- not sensitive),
          # unset by default. Only THIS account sets it to "1", after creating the vivijure-modules
          # dispatch namespace out of band. A community fork/self-host never sets it, so their render
          # keeps the [[dispatch_namespaces]] block COMMENTED and deploys on the free plan with zero WfP
          # dependency -- the free-self-host promise. See docs/deploy-runbook.md "Phase 3".
          ENABLE_WFP_DISPATCH: ${{ vars.ENABLE_WFP_DISPATCH }}
          # #238: fills the core [[secrets_store_secrets]] store_id placeholders (same repo var as modules).
          SECRETS_STORE_ID: ${{ vars.SECRETS_STORE_ID }}
          # #238 follow-up: the R2 S3 presign endpoint is account-scoped -- built from the same
          # account id the deploy uses. R2_S3_BUCKET is an OPTIONAL repo-variable override; unset
          # falls back to `vivijure` (the R2_RENDERS bucket_name) in the render shell below.
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_S3_BUCKET: ${{ vars.R2_S3_BUCKET }}
        run: |
          set -eu
          apk add --no-cache gettext >/dev/null
          # Fail loud on an unset AUTH_MODE (do NOT default): a silent default mis-postures prod, and
          # since the v0.12.0 flip removed the whole-hostname Access app, an accidental var deletion must
          # break the render rather than quietly ship the wrong door. Mirrors deploy.sh (requires AUTH_MODE).
          if [ -z "${AUTH_MODE:-}" ]; then echo "::error::AUTH_MODE repo variable is unset -- refusing to render (set vars.AUTH_MODE to token or access)"; exit 1; fi
          export AUTH_MODE
          # #238 follow-up: render the R2 S3 presign identifiers into [vars] (they are NOT secrets).
          # The endpoint host is account-scoped; build it from CLOUDFLARE_ACCOUNT_ID (the same value
          # wrangler uses to deploy). Fail closed if that id is empty -- an empty account would render
          # https://.r2.cloudflarestorage.com and silently break every presign.
          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then echo "::error::CLOUDFLARE_ACCOUNT_ID unset -- cannot render R2_S3_ENDPOINT"; exit 1; fi
          R2_S3_ENDPOINT="https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com"; export R2_S3_ENDPOINT
          R2_S3_BUCKET="${R2_S3_BUCKET:-vivijure}"; export R2_S3_BUCKET
          VARS='$AUTH_MODE $ACCESS_TEAM_DOMAIN $ACCESS_AUD $D1_DATABASE_ID $VPC_VIDEO_FINISH_ID $VPC_IMAGE_PREP_ID $VPC_AUDIO_BEAT_SYNC_ID $VPC_AUDIO_MIX_ID $SPEND_RATE_LIMITER_NS_ID $R2_S3_ENDPOINT $R2_S3_BUCKET'
          envsubst "$VARS" < wrangler.toml.example > wrangler.toml
          # fail-closed: no placeholder may survive OUTSIDE comments (a missing secret would leave a
          # literal ${...}); comment-prose mentioning ${...} is fine, and -F keeps the pattern
          # literal on every grep (the v0.16.2 MCP-guard lesson: '${' as a regex is grep-dependent).
          if grep -v '^[[:space:]]*#' wrangler.toml | grep -qF '${'; then echo "::error::unsubstituted placeholder in wrangler.toml"; grep -nF '${' wrangler.toml | grep -v ':[[:space:]]*#'; exit 1; fi
          # Auth guard (mode-aware since #423): AUTH_MODE must render non-empty, and access mode
          # additionally needs the armed Access vars NON-EMPTY (a blank would unarm -> DENY 503).
          grep -Eq 'AUTH_MODE = ".+"' wrangler.toml || { echo "::error::AUTH_MODE empty after render"; exit 1; }
          if [ "$AUTH_MODE" = "access" ]; then
            grep -Eq 'ACCESS_AUD = ".+"' wrangler.toml && grep -Eq 'ACCESS_TEAM_DOMAIN = ".+"' wrangler.toml || { echo "::error::F2 Access vars empty/missing after render"; exit 1; }
          fi
          # #238 follow-up: the R2 S3 endpoint must render to a well-formed account host (an empty
          # account id would leave https://.r2.cloudflarestorage.com and break every presign).
          grep -Eq 'R2_S3_ENDPOINT = "https://[0-9a-f]+\.r2\.cloudflarestorage\.com"' wrangler.toml || { echo "::error::R2_S3_ENDPOINT malformed after render"; exit 1; }
          grep -Eq 'R2_S3_BUCKET = ".+"' wrangler.toml || { echo "::error::R2_S3_BUCKET empty after render"; exit 1; }
          # Opt-in WfP: uncomment the [[dispatch_namespaces]] block ONLY when this account set the
          # ENABLE_WFP_DISPATCH variable to "1" (namespace already created out of band). The committed
          # wrangler.toml.example ships the block COMMENTED, so with the var unset (every community
          # self-host) the render stays commented and deploys free. Fail-closed: if the var is set but
          # the block did not uncomment (example drifted), error rather than deploy a half-config.
          if [ "${ENABLE_WFP_DISPATCH:-}" = "1" ]; then
            sed -i \
              -e 's/^# \(\[\[dispatch_namespaces\]\]\)$/\1/' \
              -e 's/^# \(binding = "MODULE_DISPATCH"\)$/\1/' \
              -e 's/^# \(namespace = "vivijure-modules"\)$/\1/' \
              wrangler.toml
            grep -q '^\[\[dispatch_namespaces\]\]$' wrangler.toml \
              && grep -q '^binding = "MODULE_DISPATCH"$' wrangler.toml \
              && grep -q '^namespace = "vivijure-modules"$' wrangler.toml \
              || { echo "::error::ENABLE_WFP_DISPATCH=1 but dispatch block did not uncomment (example drifted)"; exit 1; }
            echo "WfP dispatch ENABLED for this deploy (MODULE_DISPATCH -> vivijure-modules)."
          fi
          # #238: fill the Secrets Store id for the core [[secrets_store_secrets]] bindings from the
          # SECRETS_STORE_ID repo variable (mirrors the module deploy loop), then fail CLOSED if any
          # placeholder survived -- a core deployed with an unfilled store binding is a self-inflicted outage.
          if [ -z "${SECRETS_STORE_ID:-}" ]; then echo "::error::SECRETS_STORE_ID repo variable is unset -- refusing to deploy the core with unfilled store_id bindings"; exit 1; fi
          sed -i "s/REPLACE_WITH_VIVIJURE_SECRETS_STORE_ID/${SECRETS_STORE_ID}/g" wrangler.toml
          if grep -q "REPLACE_WITH_" wrangler.toml; then echo "::error::core store_id placeholder survived in wrangler.toml"; exit 1; fi
          echo "Rendered wrangler.toml from wrangler.toml.example ($(wc -l < wrangler.toml) lines, F2 vars present)."

      # Apply D1 schema migrations AFTER the wrangler.toml render above (wrangler needs that config
      # to resolve the D1 binding + migrations_dir) and BEFORE the core deploys, so new code never
      # runs against an old schema. Idempotent: wrangler only runs untracked migrations. Additive migrations only; a
      # destructive one would need a manual gate.
      - name: Apply D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 migrations apply vivijure-studio --remote

      - name: Deploy core worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run deploy

      # Post-deploy gate self-check (S9 W3): PROVE prod is fail-closed. Hit a real /api/* route with
      # NO bearer and REQUIRE 403 -- the deny an unauthenticated caller must get (src/index.ts gates
      # every /api/* before routing). The worker is already LIVE by this step, so this never rolls
      # back a deploy; it turns an accidentally-OPEN studio into a RED CI run instead of a silent
      # ship (the automatic version of the v0.12.0 live matrix). No new secrets: the hostname is the
      # route pattern already in the rendered wrangler.toml. Edge propagation can lag, so a non-403
      # is retried for ~60s. POSIX sh (BusyBox ash in node:22-alpine); no bash-isms.
      - name: Post-deploy gate self-check
        run: |
          set -eu
          command -v curl >/dev/null 2>&1 || apk add --no-cache curl >/dev/null
          # Derive the hostname from the rendered route pattern; strip a trailing /* if it is a path
          # pattern. A workers.dev / route-less deploy has no pattern -- skip rather than false-alarm.
          HOST="$(grep -oE 'pattern = "[^"]+"' wrangler.toml | head -1 | sed -E 's/^pattern = "([^"]+)"$/\1/' | sed -E 's#/\*?$##')"
          if [ -z "${HOST:-}" ]; then
            echo "::warning::no route pattern in wrangler.toml -- skipping post-deploy gate self-check (workers.dev / no custom domain?)"
            exit 0
          fi
          URL="https://${HOST}/api/modules"
          echo "Proving the gate: no-bearer GET ${URL} must return 403."
          n=0
          code="000"
          while [ "$n" -lt 12 ]; do
            # NO Authorization header on purpose: this is the unauthenticated caller the gate denies.
            code="$(curl -sS -o /dev/null -w '%{http_code}' --max-time 10 "$URL" 2>/dev/null || echo 000)"
            if [ "$code" = "403" ]; then
              echo "gate OK: ${URL} -> 403 (fail-closed confirmed)."
              exit 0
            fi
            n=$((n + 1))
            echo "not gated yet (HTTP ${code}); edge may still be propagating -- retry ${n}/12"
            [ "$n" -lt 12 ] && sleep 5
          done
          if [ "$code" = "200" ]; then
            echo "::error::DEPLOY GATE CHECK FAILED -- STUDIO MAY BE OPEN: no-bearer ${URL} returned 200 (the API served an unauthenticated caller). Expected 403. See docs/SECURITY.md."
          else
            echo "::error::post-deploy gate self-check failed: no-bearer ${URL} returned HTTP ${code} (expected 403). See docs/SECURITY.md."
          fi
          exit 1

      # Opt-in, self-host safe edge-cache purge. The core worker is already LIVE by this step, so a
      # failure here NEVER rolls back the deploy -- it just means /welcome may serve stale from the
      # edge until purged. Gated exactly like ENABLE_WFP_DISPATCH: a community
      # self-host sets none of the three values below, so this is a clean no-op (exit 0). Only when a
      # zone id, purge host, and a purge-scoped token (NOT the deploy token) are all set do we purge.
      # POSIX sh (BusyBox ash in node:22-alpine); no jq/python in the image, so we grep the JSON.
      - name: Purge Cloudflare edge cache (/welcome)
        env:
          CF_ZONE_ID: ${{ vars.CF_ZONE_ID }}
          CF_PURGE_HOST: ${{ vars.CF_PURGE_HOST }}
          CF_CACHE_PURGE_TOKEN: ${{ secrets.CF_CACHE_PURGE_TOKEN }}
        run: |
          if [ -z "${CF_ZONE_ID:-}" ] || [ -z "${CF_PURGE_HOST:-}" ] || [ -z "${CF_CACHE_PURGE_TOKEN:-}" ]; then
            echo "cache purge not configured, skipping"
            exit 0
          fi
          command -v curl >/dev/null 2>&1 || apk add --no-cache curl
          echo "Purging edge cache for https://${CF_PURGE_HOST}/welcome and https://${CF_PURGE_HOST}/ (zone ${CF_ZONE_ID})"
          CODE="$(curl -s -o /tmp/cf_purge_resp.json -w "%{http_code}" -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_CACHE_PURGE_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "{\"files\":[\"https://${CF_PURGE_HOST}/welcome\",\"https://${CF_PURGE_HOST}/\"]}")" || CODE="000"
          CODE="${CODE:-000}"
          BODY="$(cat /tmp/cf_purge_resp.json 2>/dev/null || true)"
          echo "purge HTTP ${CODE}"
          printf "%s\n" "$BODY"
          if [ "$CODE" -ge 200 ] 2>/dev/null && [ "$CODE" -lt 300 ] 2>/dev/null && printf "%s" "$BODY" | grep -Eq "\"success\"[[:space:]]*:[[:space:]]*true"; then
            echo "Edge cache purged for /welcome and / on ${CF_PURGE_HOST}."
          else
            echo "::error::Cloudflare cache purge failed (HTTP ${CODE}). The worker is LIVE; purge https://${CF_PURGE_HOST}/welcome and https://${CF_PURGE_HOST}/ manually for zone ${CF_ZONE_ID}."
            exit 1
          fi

      # Opt-in Studio MCP Worker deploy (docs/mcp.md). Separate Worker from the studio core
      # (@skyphusion-labs/vivijure-mcp, its own host); agents drive the Studio API through MCP
      # tools. Gated exactly like the WfP / analytics / purge opt-ins: a community self-host sets
      # no-op. Only when BOTH MCP_HOST (the MCP hostname) and MCP_STUDIO_URL (the studio base URL the
      # MCP proxies to) are set do we render wrangler.mcp.toml and deploy. Its two secrets
      # (STUDIO_API_TOKEN, MCP_TOKEN) are seeded ONCE out-of-band (see docs/mcp.md), never in CI --
      # same doctrine as the module secrets, so no secret value passes through GitHub. POSIX sh
      # (BusyBox ash in node:22-alpine); no bash-isms.
      - name: Deploy Studio MCP Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          MCP_HOST: ${{ vars.MCP_HOST }}
          MCP_STUDIO_URL: ${{ vars.MCP_STUDIO_URL }}
        run: |
          set -eu
          if [ -z "${MCP_HOST:-}" ] || [ -z "${MCP_STUDIO_URL:-}" ]; then
            echo "MCP deploy not configured (MCP_HOST / MCP_STUDIO_URL unset), skipping"
            exit 0
          fi
          apk add --no-cache gettext >/dev/null
          export MCP_HOST MCP_STUDIO_URL
          envsubst '$MCP_HOST $MCP_STUDIO_URL' < wrangler.mcp.toml.example > wrangler.mcp.toml
          # fail-closed: no placeholder may survive OUTSIDE comments (a missing var would leave a
          # literal ${...}). Comment lines are excluded: the template's own prose mentions ${...},
          # which envsubst correctly leaves alone (this grep failed every tag deploy at v0.16.2).
          # -F throughout: the pattern '${' is grep-dependent as a regex (busybox matches it
          # literally, GNU treats $ as an anchor and matches NOTHING -> guard silently disarmed).
          if grep -v '^[[:space:]]*#' wrangler.mcp.toml | grep -qF '${'; then echo "::error::unsubstituted placeholder in wrangler.mcp.toml"; grep -nF '${' wrangler.mcp.toml | grep -v ':[[:space:]]*#'; exit 1; fi
          echo "Deploying vivijure-studio-mcp to ${MCP_HOST} (studio ${MCP_STUDIO_URL})..."
          npx wrangler deploy -c wrangler.mcp.toml
