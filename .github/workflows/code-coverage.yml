name: coverage

# Produces real, inspectable coverage and uploads it as a build artifact. The
# previous version used actions/upload-code-coverage@v1 and a code-quality:write
# permission, both GitHub Enterprise only; on github.com those steps were green
# no-ops, so "coverage" reflected nothing. It also ran `npm run bootstrap`, a
# script this repo does not define (wrangler.toml is committed here), so that
# step always errored under continue-on-error. This runs the real suite with the
# v8 provider and keeps the report as a downloadable artifact.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Checkout vivijure-core
        uses: actions/checkout@v7
        with:
          repository: skyphusion-labs/vivijure-core
          path: vivijure-core

      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: |
          cd vivijure-core && npm ci && npm run build
          npm pkg set dependencies.@skyphusion-labs/vivijure-core=file:./vivijure-core
          npm ci

      - name: Run tests with coverage
        run: npx vitest run --coverage.enabled=true --coverage.provider=v8 --coverage.reporter=cobertura --coverage.reporter=text

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: warn
          retention-days: 14
